services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-crm_database}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-2020}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run schema on first boot
      - ./crm_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-crm_database}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm-network

  # ── Backend ────────────────────────────────────────────────────────────
  crm-backend:
    build:
      context: ./backend-crm
      dockerfile: Dockerfile
    container_name: backend-crm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:               ${NODE_ENV:-production}
      PORT:                   5000
      DB_HOST:                postgres
      DB_PORT:                5432
      DB_NAME:                ${DB_NAME:-crm_database}
      DB_USER:                ${DB_USER:-postgres}
      DB_PASSWORD:            ${DB_PASSWORD:-postgres}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS:          ${BCRYPT_ROUNDS:-12}
      CLIENT_ORIGIN:          ${CLIENT_ORIGIN:-http://localhost:80}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - crm-network

  # ── Frontend ───────────────────────────────────────────────────────────
  crm-frontend:
    build:
      context: ./frontend-crm
      dockerfile: Dockerfile
      args:
        # At build time the browser needs the public-facing API URL
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    container_name: frontend-crm
    restart: unless-stopped
    depends_on:
      crm-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - crm-network

  # ── Migrations (runs once then exits) ─────────────────────────────────
  crm-migrate:
    build:
      context: ./backend-crm
      dockerfile: Dockerfile
    container_name: crm-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-crm_database}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    command: >
      sh -c "
        node src/db/migrate.js &&
        node src/db/migrate_tickets.js &&
        node src/db/migrate_password_reset.js &&
        node src/db/migrate_users_phone.js &&
        node src/db/migrate_jobcards.js
      "
    networks:
      - crm-network

volumes:
  postgres_data:
    driver: local

networks:
  crm-network:
    driver: bridge